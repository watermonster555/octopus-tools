<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>密码生成器 - Octopus</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .password-display {
      background: var(--bg-secondary);
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      position: relative;
      word-break: break-all;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 1.25rem;
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .password-display.has-password {
      border-color: var(--accent);
      background: rgba(0, 212, 170, 0.05);
    }

    .password-placeholder {
      color: var(--text-secondary);
      font-size: 1rem;
    }

    .password-text {
      color: var(--accent);
      letter-spacing: 2px;
    }

    .copy-btn {
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      background: var(--accent);
      color: #000;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 600;
      opacity: 0;
      transition: all 0.3s;
    }

    .password-display.has-password .copy-btn {
      opacity: 1;
    }

    .copy-btn:hover {
      background: var(--accent-hover);
      transform: translateY(-50%) scale(1.05);
    }

    .strength-meter {
      margin-top: 1rem;
      padding: 1rem;
      background: var(--bg-secondary);
      border-radius: 8px;
      display: none;
    }

    .strength-meter.show {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    .strength-bar {
      height: 8px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 0.5rem;
    }

    .strength-fill {
      height: 100%;
      width: 0;
      border-radius: 4px;
      transition: all 0.3s ease;
    }

    .strength-fill.weak {
      width: 33%;
      background: #e74c3c;
    }

    .strength-fill.medium {
      width: 66%;
      background: #f39c12;
    }

    .strength-fill.strong {
      width: 100%;
      background: var(--accent);
    }

    .strength-text {
      font-size: 0.875rem;
      font-weight: 600;
    }

    .strength-text.weak {
      color: #e74c3c;
    }

    .strength-text.medium {
      color: #f39c12;
    }

    .strength-text.strong {
      color: var(--accent);
    }

    .length-slider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .length-slider input[type="range"] {
      flex: 1;
    }

    .length-value {
      min-width: 50px;
      text-align: center;
      font-size: 1.25rem;
      font-weight: bold;
      color: var(--accent);
    }

    .options-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem;
      background: var(--bg-secondary);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .checkbox-item:hover {
      background: var(--border);
    }

    .checkbox-item input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .checkbox-item label {
      cursor: pointer;
      margin: 0;
      flex: 1;
    }

    .history-section {
      margin-top: 2rem;
      padding-top: 2rem;
      border-top: 1px solid var(--border);
    }

    .history-title {
      font-size: 1rem;
      color: var(--text-secondary);
      margin-bottom: 1rem;
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .history-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 1rem;
      background: var(--bg-secondary);
      border-radius: 8px;
      font-family: monospace;
      font-size: 0.875rem;
    }

    .history-item .password {
      color: var(--text-primary);
    }

    .history-item .time {
      color: var(--text-secondary);
      font-size: 0.75rem;
    }

    .btn-generate {
      width: 100%;
      padding: 1rem;
      font-size: 1.1rem;
    }

    @keyframes pulse-glow {
      0%, 100% {
        box-shadow: 0 0 0 0 rgba(0, 212, 170, 0.4);
      }
      50% {
        box-shadow: 0 0 0 10px rgba(0, 212, 170, 0);
      }
    }

    .btn-generate:active {
      animation: pulse-glow 0.5s ease;
    }
  </style>
</head>
<body>
  <!-- 导航栏 -->
  <nav>
    <div class="nav-container">
      <a href="../index.html" class="logo">🐙 Octopus</a>
      <div class="nav-links">
        <a href="qr-generator.html">二维码</a>
        <a href="password-gen.html">密码生成</a>
        <a href="json-formatter.html">JSON</a>
      </div>
    </div>
  </nav>

  <!-- 主体 -->
  <main class="tool-container">
    <div class="tool-header">
      <h1>密码生成器</h1>
      <p>生成高强度密码，保护你的账户安全</p>
    </div>

    <div class="card">
      <!-- 密码显示区 -->
      <div class="password-display" id="password-display">
        <span class="password-placeholder">点击生成按钮创建密码</span>
        <button class="copy-btn" id="copy-btn" onclick="copyPassword()">复制</button>
      </div>

      <!-- 强度指示器 -->
      <div class="strength-meter" id="strength-meter">
        <div class="strength-bar">
          <div class="strength-fill" id="strength-fill"></div>
        </div>
        <div class="strength-text" id="strength-text">密码强度</div>
      </div>

      <!-- 长度选择 -->
      <div class="input-group">
        <label>密码长度</label>
        <div class="length-slider">
          <input type="range" id="length" min="6" max="32" value="16">
          <span class="length-value" id="length-value">16</span>
        </div>
      </div>

      <!-- 选项 -->
      <div class="input-group">
        <label>包含字符</label>
        <div class="options-grid">
          <div class="checkbox-item">
            <input type="checkbox" id="uppercase" checked>
            <label for="uppercase">大写字母 (A-Z)</label>
          </div>
          <div class="checkbox-item">
            <input type="checkbox" id="lowercase" checked>
            <label for="lowercase">小写字母 (a-z)</label>
          </div>
          <div class="checkbox-item">
            <input type="checkbox" id="numbers" checked>
            <label for="numbers">数字 (0-9)</label>
          </div>
          <div class="checkbox-item">
            <input type="checkbox" id="symbols">
            <label for="symbols">特殊符号 (!@#$...)</label>
          </div>
        </div>
      </div>

      <!-- 生成按钮 -->
      <button class="btn btn-generate" onclick="generatePassword()">生成密码</button>

      <!-- 历史记录 -->
      <div class="history-section" id="history-section" style="display: none;">
        <div class="history-title">最近生成</div>
        <div class="history-list" id="history-list"></div>
      </div>
    </div>
  </main>

  <!-- 页脚 -->
  <footer>
    <p>🐙 Octopus | 一个大脑，多条触手</p>
  </footer>

  <!-- 提示 -->
  <div class="toast" id="toast"></div>

  <script>
    let passwordHistory = [];

    // 长度滑块实时更新
    document.getElementById('length').addEventListener('input', function() {
      document.getElementById('length-value').textContent = this.value;
    });

    // 生成密码
    function generatePassword() {
      const length = parseInt(document.getElementById('length').value);
      const useUpper = document.getElementById('uppercase').checked;
      const useLower = document.getElementById('lowercase').checked;
      const useNumbers = document.getElementById('numbers').checked;
      const useSymbols = document.getElementById('symbols').checked;

      // 验证至少选择一种字符类型
      if (!useUpper && !useLower && !useNumbers && !useSymbols) {
        showToast('请至少选择一种字符类型！', 'error');
        return;
      }

      // 构建字符集
      let charset = '';
      if (useUpper) charset += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
      if (useLower) charset += 'abcdefghijklmnopqrstuvwxyz';
      if (useNumbers) charset += '0123456789';
      if (useSymbols) charset += '!@#$%^&*()_+-=[]{}|;:,.<>?';

      // 生成密码
      let password = '';
      const array = new Uint32Array(length);
      window.crypto.getRandomValues(array);
      
      for (let i = 0; i < length; i++) {
        password += charset[array[i] % charset.length];
      }

      // 显示密码
      const display = document.getElementById('password-display');
      display.innerHTML = `
        <span class="password-text">${password}</span>
        <button class="copy-btn" onclick="copyPassword()">复制</button>
      `;
      display.classList.add('has-password');

      // 计算强度
      calculateStrength(password);

      // 添加到历史
      addToHistory(password);

      showToast('密码生成成功！');
    }

    // 计算密码强度
    function calculateStrength(password) {
      let score = 0;
      
      // 长度评分
      if (password.length >= 8) score += 1;
      if (password.length >= 12) score += 1;
      if (password.length >= 16) score += 1;
      
      // 复杂度评分
      if (/[a-z]/.test(password)) score += 1;
      if (/[A-Z]/.test(password)) score += 1;
      if (/[0-9]/.test(password)) score += 1;
      if (/[^a-zA-Z0-9]/.test(password)) score += 1;

      const meter = document.getElementById('strength-meter');
      const fill = document.getElementById('strength-fill');
      const text = document.getElementById('strength-text');

      meter.classList.add('show');
      fill.className = 'strength-fill';
      text.className = 'strength-text';

      if (score <= 3) {
        fill.classList.add('weak');
        text.classList.add('weak');
        text.textContent = '弱 - 建议增加长度和复杂度';
      } else if (score <= 5) {
        fill.classList.add('medium');
        text.classList.add('medium');
        text.textContent = '中等 - 还可以更强';
      } else {
        fill.classList.add('strong');
        text.classList.add('strong');
        text.textContent = '强 - 非常安全的密码';
      }
    }

    // 复制密码
    function copyPassword() {
      const passwordText = document.querySelector('.password-text');
      if (!passwordText) return;

      navigator.clipboard.writeText(passwordText.textContent).then(() => {
        showToast('密码已复制到剪贴板！');
      }).catch(() => {
        showToast('复制失败，请手动复制', 'error');
      });
    }

    // 添加到历史
    function addToHistory(password) {
      const now = new Date();
      const timeStr = now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
      
      passwordHistory.unshift({ password, time: timeStr });
      if (passwordHistory.length > 5) passwordHistory.pop();

      const historySection = document.getElementById('history-section');
      const historyList = document.getElementById('history-list');
      
      historySection.style.display = 'block';
      historyList.innerHTML = passwordHistory.map(item => `
        <div class="history-item">
          <span class="password">${item.password}</span>
          <span class="time">${item.time}</span>
        </div>
      `).join('');
    }

    // 显示提示
    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      if (type === 'error') {
        toast.style.background = '#e74c3c';
        toast.style.color = '#fff';
      } else {
        toast.style.background = 'var(--accent)';
        toast.style.color = '#000';
      }
      toast.classList.add('show');
      setTimeout(() => {
        toast.classList.remove('show');
      }, 2000);
    }

    // 页面加载时生成一个默认密码
    window.addEventListener('load', () => {
      generatePassword();
    });
  </script>
</body>
</html>
