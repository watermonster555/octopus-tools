<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图片压缩 - Octopus</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .upload-area {
      border: 2px dashed var(--border);
      border-radius: 16px;
      padding: 3rem 2rem;
      text-align: center;
      background: var(--bg-secondary);
      transition: all 0.3s;
      cursor: pointer;
      margin-bottom: 1.5rem;
    }

    .upload-area:hover,
    .upload-area.dragover {
      border-color: var(--accent);
      background: rgba(0, 212, 170, 0.05);
    }

    .upload-icon {
      font-size: 4rem;
      margin-bottom: 1rem;
    }

    .upload-text {
      font-size: 1.1rem;
      color: var(--text-primary);
      margin-bottom: 0.5rem;
    }

    .upload-hint {
      font-size: 0.875rem;
      color: var(--text-secondary);
    }

    .upload-formats {
      margin-top: 1rem;
      font-size: 0.75rem;
      color: var(--text-secondary);
      opacity: 0.7;
    }

    #file-input {
      display: none;
    }

    /* 图片对比区域 */
    .compare-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      margin-bottom: 1.5rem;
    }

    @media (max-width: 768px) {
      .compare-section {
        grid-template-columns: 1fr;
      }
    }

    .image-panel {
      background: var(--bg-secondary);
      border-radius: 12px;
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 1rem;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
    }

    .panel-title {
      font-weight: 600;
      font-size: 0.9rem;
    }

    .panel-info {
      font-size: 0.8rem;
      color: var(--text-secondary);
    }

    .image-container {
      padding: 1rem;
      text-align: center;
      min-height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .image-container img {
      max-width: 100%;
      max-height: 300px;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    .placeholder-text {
      color: var(--text-secondary);
    }

    /* 压缩控制 */
    .control-section {
      background: var(--bg-secondary);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .quality-control {
      margin-bottom: 1.5rem;
    }

    .quality-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.75rem;
    }

    .quality-label {
      font-weight: 600;
    }

    .quality-value {
      background: var(--accent);
      color: #000;
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
      font-weight: 600;
      font-size: 0.875rem;
    }

    .quality-slider {
      width: 100%;
      height: 8px;
      -webkit-appearance: none;
      background: var(--bg-card);
      border-radius: 4px;
      outline: none;
    }

    .quality-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 24px;
      height: 24px;
      background: var(--accent);
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 2px 10px rgba(0, 212, 170, 0.4);
      transition: transform 0.2s;
    }

    .quality-slider::-webkit-slider-thumb:hover {
      transform: scale(1.1);
    }

    .quality-hints {
      display: flex;
      justify-content: space-between;
      margin-top: 0.5rem;
      font-size: 0.75rem;
      color: var(--text-secondary);
    }

    /* 统计信息 */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-top: 1rem;
    }

    .stat-box {
      text-align: center;
      padding: 1rem;
      background: var(--bg-card);
      border-radius: 8px;
    }

    .stat-value {
      font-size: 1.5rem;
      font-weight: bold;
      color: var(--accent);
    }

    .stat-label {
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-top: 0.25rem;
    }

    /* 格式选择 */
    .format-section {
      margin-top: 1.5rem;
    }

    .format-label {
      font-weight: 600;
      margin-bottom: 0.75rem;
      display: block;
    }

    .format-options {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .format-option {
      position: relative;
    }

    .format-option input {
      position: absolute;
      opacity: 0;
    }

    .format-option label {
      display: block;
      padding: 0.75rem 1.5rem;
      background: var(--bg-card);
      border: 2px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .format-option input:checked + label {
      border-color: var(--accent);
      background: rgba(0, 212, 170, 0.1);
    }

    .format-option label:hover {
      border-color: var(--accent);
    }

    /* 操作按钮 */
    .action-section {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn-compress {
      padding: 1rem 3rem;
      font-size: 1.1rem;
    }

    .btn-download {
      background: linear-gradient(135deg, var(--accent), #00b894);
    }

    /* 压缩结果 */
    .result-section {
      margin-top: 1.5rem;
      padding: 1.5rem;
      background: rgba(0, 212, 170, 0.1);
      border: 1px solid var(--accent);
      border-radius: 12px;
      text-align: center;
    }

    .result-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: var(--accent);
    }

    .savings {
      font-size: 2rem;
      font-weight: bold;
      color: var(--accent);
    }

    .savings-label {
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    /* 批量处理 */
    .batch-section {
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
    }

    .batch-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .batch-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.75rem 1rem;
      background: var(--bg-card);
      border-radius: 8px;
    }

    .batch-thumb {
      width: 50px;
      height: 50px;
      border-radius: 4px;
      object-fit: cover;
    }

    .batch-info {
      flex: 1;
    }

    .batch-name {
      font-weight: 600;
      font-size: 0.9rem;
    }

    .batch-size {
      font-size: 0.8rem;
      color: var(--text-secondary);
    }

    .batch-status {
      font-size: 0.8rem;
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
    }

    .status-pending {
      background: var(--bg-secondary);
      color: var(--text-secondary);
    }

    .status-done {
      background: rgba(0, 212, 170, 0.2);
      color: var(--accent);
    }

    .batch-remove {
      background: transparent;
      border: none;
      color: #e74c3c;
      cursor: pointer;
      font-size: 1.25rem;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <!-- 导航栏 -->
  <nav>
    <div class="nav-container">
      <a href="../index.html" class="logo">🐙 Octopus</a>
      <div class="nav-links">
        <a href="qr-generator.html">二维码</a>
        <a href="password-gen.html">密码生成</a>
        <a href="json-formatter.html">JSON</a>
      </div>
    </div>
  </nav>

  <!-- 主体 -->
  <main class="tool-container">
    <div class="tool-header">
      <h1>图片压缩</h1>
      <p>压缩图片文件大小，本地处理保护隐私，支持批量处理</p>
    </div>

    <div class="card">
      <!-- 上传区域 -->
      <div class="upload-area" id="upload-area" onclick="document.getElementById('file-input').click()">
        <div class="upload-icon">🖼️</div>
        <div class="upload-text">点击或拖拽图片到此处</div>
        <div class="upload-hint">支持 JPG、PNG、WebP 格式</div>
        <div class="upload-formats">单张最大 10MB，支持批量上传</div>
        <input type="file" id="file-input" accept="image/*" multiple onchange="handleFiles(this.files)">
      </div>

      <!-- 图片对比（单张模式） -->
      <div class="compare-section hidden" id="compare-section">
        <div class="image-panel">
          <div class="panel-header">
            <span class="panel-title">原图</span>
            <span class="panel-info" id="original-info">-</span>
          </div>
          <div class="image-container">
            <img id="original-image" alt="原图">
          </div>
        </div>

        <div class="image-panel">
          <div class="panel-header">
            <span class="panel-title">压缩后</span>
            <span class="panel-info" id="compressed-info">-</span>
          </div>
          <div class="image-container">
            <img id="compressed-image" alt="压缩后">
          </div>
        </div>
      </div>

      <!-- 压缩控制 -->
      <div class="control-section hidden" id="control-section">
        <div class="quality-control">
          <div class="quality-header">
            <span class="quality-label">压缩质量</span>
            <span class="quality-value" id="quality-value">80%</span>
          </div>
          <input type="range" class="quality-slider" id="quality-slider" min="10" max="100" value="80" oninput="updateQuality(this.value)">
          <div class="quality-hints">
            <span>低质量（文件小）</span>
            <span>高质量（文件大）</span>
          </div>
        </div>

        <!-- 格式选择 -->
        <div class="format-section">
          <span class="format-label">输出格式</span>
          <div class="format-options">
            <div class="format-option">
              <input type="radio" name="format" id="format-original" value="original" checked>
              <label for="format-original">保持原格式</label>
            </div>
            <div class="format-option">
              <input type="radio" name="format" id="format-jpeg" value="jpeg">
              <label for="format-jpeg">JPEG</label>
            </div>
            <div class="format-option">
              <input type="radio" name="format" id="format-png" value="png">
              <label for="format-png">PNG</label>
            </div>
            <div class="format-option">
              <input type="radio" name="format" id="format-webp" value="webp">
              <label for="format-webp">WebP</label>
            </div>
          </div>
        </div>

        <!-- 统计 -->
        <div class="stats-grid">
          <div class="stat-box">
            <div class="stat-value" id="original-size">-</div>
            <div class="stat-label">原图大小</div>
          </div>
          <div class="stat-box">
            <div class="stat-value" id="compressed-size">-</div>
            <div class="stat-label">压缩后</div>
          </div>
          <div class="stat-box">
            <div class="stat-value" id="savings-percent">-</div>
            <div class="stat-label">节省空间</div>
          </div>
        </div>
      </div>

      <!-- 操作按钮 -->
      <div class="action-section" id="action-section">
        <button class="btn btn-compress" id="compress-btn" onclick="compressImage()" disabled>请先上传图片</button>
        <button class="btn btn-download hidden" id="download-btn" onclick="downloadImage()">下载压缩后的图片</button>
        <button class="btn btn-secondary hidden" id="new-image-btn" onclick="resetTool()">处理新图片</button>
      </div>

      <!-- 批量处理列表 -->
      <div class="batch-section hidden" id="batch-section">
        <h3 style="margin-bottom: 1rem;">批量处理列表</h3>
        <div class="batch-list" id="batch-list"></div>
        <button class="btn" style="width: 100%; margin-top: 1rem;" onclick="compressBatch()">开始批量压缩</button>
      </div>
    </div>
  </main>

  <!-- 页脚 -->
  <footer>
    <p>🐙 Octopus | 一个大脑，多条触手</p>
  </footer>

  <!-- 提示 -->
  <div class="toast" id="toast"></div>

  <script>
    let currentFile = null;
    let compressedBlob = null;
    let batchFiles = [];

    // 处理文件上传
    function handleFiles(files) {
      if (!files || files.length === 0) return;

      if (files.length === 1) {
        // 单张模式
        currentFile = files[0];
        batchFiles = [];
        loadSingleImage(currentFile);
      } else {
        // 批量模式
        batchFiles = Array.from(files).filter(file => file.type.startsWith('image/'));
        currentFile = null;
        loadBatchImages();
      }
    }

    // 加载单张图片
    function loadSingleImage(file) {
      if (!file.type.startsWith('image/')) {
        showToast('请选择图片文件', 'error');
        return;
      }

      if (file.size > 10 * 1024 * 1024) {
        showToast('图片大小不能超过 10MB', 'error');
        return;
      }

      const reader = new FileReader();
      reader.onload = function(e) {
        const img = document.getElementById('original-image');
        img.src = e.target.result;
        img.onload = function() {
          document.getElementById('original-info').textContent = `${this.naturalWidth} × ${this.naturalHeight}`;
        };

        // 显示控制区域
        document.getElementById('upload-area').classList.add('hidden');
        document.getElementById('compare-section').classList.remove('hidden');
        document.getElementById('control-section').classList.remove('hidden');
        document.getElementById('batch-section').classList.add('hidden');
        
        // 更新统计
        document.getElementById('original-size').textContent = formatFileSize(file.size);
        document.getElementById('compressed-size').textContent = '-';
        document.getElementById('savings-percent').textContent = '-';
        
        // 启用压缩按钮
        const btn = document.getElementById('compress-btn');
        btn.disabled = false;
        btn.textContent = '压缩图片';
        
        // 隐藏下载按钮
        document.getElementById('download-btn').classList.add('hidden');
        document.getElementById('new-image-btn').classList.add('hidden');
        
        // 清空压缩后的预览
        document.getElementById('compressed-image').src = '';
        
        showToast('图片加载成功，调整质量后点击压缩');
      };
      reader.readAsDataURL(file);
    }

    // 加载批量图片
    function loadBatchImages() {
      const list = document.getElementById('batch-list');
      list.innerHTML = '';

      batchFiles.forEach((file, index) => {
        const reader = new FileReader();
        reader.onload = function(e) {
          const item = document.createElement('div');
          item.className = 'batch-item';
          item.innerHTML = `
            <img src="${e.target.result}" class="batch-thumb" alt="${file.name}">
            <div class="batch-info">
              <div class="batch-name">${file.name}</div>
              <div class="batch-size">${formatFileSize(file.size)}</div>
            </div>
            <span class="batch-status status-pending" id="status-${index}">待处理</span>
            <button class="batch-remove" onclick="removeBatchItem(${index})">×</button>
          `;
          list.appendChild(item);
        };
        reader.readAsDataURL(file);
      });

      document.getElementById('upload-area').classList.add('hidden');
      document.getElementById('compare-section').classList.add('hidden');
      document.getElementById('control-section').classList.remove('hidden');
      document.getElementById('batch-section').classList.remove('hidden');
      
      document.getElementById('compress-btn').classList.add('hidden');
      document.getElementById('download-btn').classList.add('hidden');
      
      showToast(`已加载 ${batchFiles.length} 张图片`);
    }

    // 移除批量项
    function removeBatchItem(index) {
      batchFiles.splice(index, 1);
      loadBatchImages();
    }

    // 更新质量显示
    function updateQuality(value) {
      document.getElementById('quality-value').textContent = value + '%';
    }

    // 压缩图片
    function compressImage() {
      if (!currentFile) return;

      const quality = parseInt(document.getElementById('quality-slider').value) / 100;
      const format = document.querySelector('input[name="format"]:checked').value;

      const img = document.getElementById('original-image');
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');

      canvas.width = img.naturalWidth;
      canvas.height = img.naturalHeight;
      ctx.drawImage(img, 0, 0);

      let mimeType = currentFile.type;
      if (format === 'jpeg') mimeType = 'image/jpeg';
      else if (format === 'png') mimeType = 'image/png';
      else if (format === 'webp') mimeType = 'image/webp';

      canvas.toBlob(function(blob) {
        compressedBlob = blob;
        const url = URL.createObjectURL(blob);
        const compressedImg = document.getElementById('compressed-image');
        compressedImg.src = url;
        
        compressedImg.onload = function() {
          document.getElementById('compressed-info').textContent = `${this.naturalWidth} × ${this.naturalHeight}`;
        };

        // 更新统计
        document.getElementById('compressed-size').textContent = formatFileSize(blob.size);
        const savings = ((currentFile.size - blob.size) / currentFile.size * 100).toFixed(1);
        document.getElementById('savings-percent').textContent = savings + '%';

        // 显示下载按钮
        document.getElementById('download-btn').classList.remove('hidden');
        document.getElementById('new-image-btn').classList.remove('hidden');
        document.getElementById('compress-btn').classList.add('hidden');

        showToast(`压缩完成！节省了 ${savings}% 的空间`);
      }, mimeType, quality);
    }

    // 批量压缩
    async function compressBatch() {
      const quality = parseInt(document.getElementById('quality-slider').value) / 100;
      
      for (let i = 0; i < batchFiles.length; i++) {
        const file = batchFiles[i];
        const statusEl = document.getElementById(`status-${i}`);
        statusEl.textContent = '处理中...';
        statusEl.className = 'batch-status status-pending';

        await new Promise((resolve) => {
          const reader = new FileReader();
          reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
              const canvas = document.createElement('canvas');
              const ctx = canvas.getContext('2d');
              canvas.width = img.width;
              canvas.height = img.height;
              ctx.drawImage(img, 0, 0);

              canvas.toBlob(function(blob) {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'compressed_' + file.name;
                a.click();
                URL.revokeObjectURL(url);

                statusEl.textContent = '完成';
                statusEl.className = 'batch-status status-done';
                resolve();
              }, file.type, quality);
            };
            img.src = e.target.result;
          };
          reader.readAsDataURL(file);
        });
      }

      showToast('批量压缩完成！');
    }

    // 下载压缩后的图片
    function downloadImage() {
      if (!compressedBlob) return;

      const url = URL.createObjectURL(compressedBlob);
      const a = document.createElement('a');
      a.href = url;
      
      const format = document.querySelector('input[name="format"]:checked').value;
      let ext = currentFile.name.split('.').pop();
      if (format === 'jpeg') ext = 'jpg';
      else if (format === 'png') ext = 'png';
      else if (format === 'webp') ext = 'webp';
      
      const name = currentFile.name.replace(/\.[^/.]+$/, '');
      a.download = `${name}_compressed.${ext}`;
      a.click();
      URL.revokeObjectURL(url);

      showToast('下载开始！');
    }

    // 重置工具
    function resetTool() {
      currentFile = null;
      compressedBlob = null;
      batchFiles = [];

      document.getElementById('upload-area').classList.remove('hidden');
      document.getElementById('compare-section').classList.add('hidden');
      document.getElementById('control-section').classList.add('hidden');
      document.getElementById('batch-section').classList.add('hidden');
      
      document.getElementById('compress-btn').classList.remove('hidden');
      document.getElementById('compress-btn').disabled = true;
      document.getElementById('compress-btn').textContent = '请先上传图片';
      document.getElementById('download-btn').classList.add('hidden');
      document.getElementById('new-image-btn').classList.add('hidden');
      
      document.getElementById('file-input').value = '';
      
      showToast('可以上传新图片了');
    }

    // 格式化文件大小
    function formatFileSize(bytes) {
      if (bytes === 0) return '0 B';
      const k = 1024;
      const sizes = ['B', 'KB', 'MB', 'GB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    }

    // 拖拽上传
    const uploadArea = document.getElementById('upload-area');
    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.classList.add('dragover');
    });
    uploadArea.addEventListener('dragleave', () => {
      uploadArea.classList.remove('dragover');
    });
    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      handleFiles(e.dataTransfer.files);
    });

    // 显示提示
    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      if (type === 'error') {
        toast.style.background = '#e74c3c';
        toast.style.color = '#fff';
      } else {
        toast.style.background = 'var(--accent)';
        toast.style.color = '#000';
      }
      toast.classList.add('show');
      setTimeout(() => {
        toast.classList.remove('show');
      }, 2000);
    }
  </script>
</body>
</html>
