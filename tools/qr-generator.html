<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>дәҢз»ҙз Ғз”ҹжҲҗеҷЁ - Octopus</title>
  <link rel="stylesheet" href="../css/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
  <!-- еҜјиҲӘж ?-->
  <nav>
    <div class="nav-container">
      <a href="../index.html" class="logo">рҹҗҷ Octopus</a>
      <div class="nav-links">
        <a href="qr-generator.html">дәҢз»ҙз ?/a>
        <a href="password-gen.html">еҜҶз Ғз”ҹжҲҗ</a>
        <a href="json-formatter.html">JSON</a>
      </div>
    </div>
  </nav>

  <!-- дё»дҪ“ -->
  <main class="tool-container">
    <div class="tool-header">
      <h1>дәҢз»ҙз Ғз”ҹжҲҗеҷЁ</h1>
      <p>иҫ“е…Ҙж–Үеӯ—жҲ–й“ҫжҺҘпјҢдёҖй”®з”ҹжҲҗдәҢз»ҙз Ғ</p>
    </div>

    <div class="card">
      <!-- иҫ“е…ҘеҢәеҹҹ -->
      <div class="input-group">
        <label for="qr-text">иҫ“е…ҘеҶ…е®№</label>
        <textarea id="qr-text" placeholder="иҫ“е…Ҙж–Үеӯ—гҖҒзҪ‘еқҖжҲ–д»»дҪ•еҶ…е®?.."></textarea>
      </div>

      <!-- йҖүйЎ№ -->
      <div class="options-group">
        <div class="input-group">
          <label for="qr-size">е°әеҜё</label>
          <input type="range" id="qr-size" min="100" max="400" value="200">
          <span id="size-value" style="color: var(--text-secondary); font-size: 0.9rem;">200px</span>
        </div>
        <div class="input-group">
          <label for="qr-color">йўңиүІ</label>
          <input type="color" id="qr-color" value="#000000" style="width: 100%; height: 40px; border: none; border-radius: 8px; cursor: pointer;">
        </div>
      </div>

      <!-- жҢүй’® -->
      <div class="btn-group">
        <button class="btn" onclick="generateQR()">з”ҹжҲҗдәҢз»ҙз ?/button>
        <button class="btn btn-secondary" onclick="clearQR()">жё…з©ә</button>
        <button class="btn btn-secondary" onclick="downloadQR()" id="download-btn" style="display: none;">дёӢиҪҪеӣҫзүҮ</button>
      </div>

      <!-- з»“жһңеұ•зӨә -->
      <div class="result-area" id="result-area">
        <div class="result-placeholder">
          <p>дәҢз»ҙз Ғе°ҶжҳҫзӨәеңЁиҝҷйҮ?/p>
        </div>
      </div>
    </div>
  </main>

  <!-- йЎөи„ҡ -->
  <footer>
    <p>рҹҗҷ Octopus | дёҖдёӘеӨ§и„‘пјҢеӨҡжқЎи§ҰжүӢ</p>
    <div style="margin: 0.5rem 0;">
      <a href="../about.html" style="color: var(--text-secondary); text-decoration: none; margin: 0 0.5rem; font-size: 0.8rem;">е…ідәҺжҲ‘д»¬</a>
      <a href="../privacy.html" style="color: var(--text-secondary); text-decoration: none; margin: 0 0.5rem; font-size: 0.8rem;">йҡҗз§Ғж”ҝзӯ–</a>
      <a href="../terms.html" style="color: var(--text-secondary); text-decoration: none; margin: 0 0.5rem; font-size: 0.8rem;">з”ЁжҲ·еҚҸи®®</a>
    </div>
    <p style="font-size: 0.75rem; color: var(--text-secondary); opacity: 0.7;">В© 2025 Octopus</p>
  </footer>

  <!-- жҸҗзӨә -->
  <div class="toast" id="toast">е·ІеӨҚеҲ¶еҲ°еүӘиҙҙжқҝпјҒ</div>

  <script>
    let currentQR = null;

    // е°әеҜёж»‘еқ—е®һж—¶жҳҫзӨә
    document.getElementById('qr-size').addEventListener('input', function() {
      document.getElementById('size-value').textContent = this.value + 'px';
    });

    // з”ҹжҲҗдәҢз»ҙз ?    function generateQR() {
      const text = document.getElementById('qr-text').value.trim();
      if (!text) {
        showToast('иҜ·иҫ“е…ҘеҶ…е®№пјҒ', 'error');
        return;
      }

      const size = parseInt(document.getElementById('qr-size').value);
      const color = document.getElementById('qr-color').value;
      const resultArea = document.getElementById('result-area');

      // жё…з©әд№ӢеүҚзҡ„з»“жһ?      resultArea.innerHTML = '';

      // еҲӣе»әдәҢз»ҙз ?      const qrDiv = document.createElement('div');
      qrDiv.id = 'qrcode';
      resultArea.appendChild(qrDiv);

      currentQR = new QRCode(qrDiv, {
        text: text,
        width: size,
        height: size,
        colorDark: color,
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.M
      });

      // жҳҫзӨәдёӢиҪҪжҢүй’®
      document.getElementById('download-btn').style.display = 'inline-flex';
      
      showToast('дәҢз»ҙз Ғз”ҹжҲҗжҲҗеҠҹпјҒ');
    }

    // жё…з©ә
    function clearQR() {
      document.getElementById('qr-text').value = '';
      document.getElementById('result-area').innerHTML = `
        <div class="result-placeholder">
          <p>дәҢз»ҙз Ғе°ҶжҳҫзӨәеңЁиҝҷйҮ?/p>
        </div>
      `;
      document.getElementById('download-btn').style.display = 'none';
      currentQR = null;
    }

    // дёӢиҪҪдәҢз»ҙз ?    function downloadQR() {
      const qrCanvas = document.querySelector('#qrcode canvas');
      if (qrCanvas) {
        const link = document.createElement('a');
        link.download = 'qrcode.png';
        link.href = qrCanvas.toDataURL('image/png');
        link.click();
        showToast('дёӢиҪҪжҲҗеҠҹпј?);
      }
    }

    // жҳҫзӨәжҸҗзӨә
    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      if (type === 'error') {
        toast.style.background = '#e74c3c';
        toast.style.color = '#fff';
      } else {
        toast.style.background = 'var(--accent)';
        toast.style.color = '#000';
      }
      toast.classList.add('show');
      setTimeout(() => {
        toast.classList.remove('show');
      }, 2000);
    }

    // еӣһиҪҰз”ҹжҲҗ
    document.getElementById('qr-text').addEventListener('keypress', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        generateQR();
      }
    });
  </script>
</body>
</html>
