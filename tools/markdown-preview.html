<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown 预览 - Octopus</title>
  <link rel="stylesheet" href="../css/style.css">
  <!-- Marked.js for Markdown parsing -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <!-- Highlight.js for code highlighting -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <style>
    .editor-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      height: calc(100vh - 250px);
      min-height: 500px;
    }

    @media (max-width: 900px) {
      .editor-container {
        grid-template-columns: 1fr;
        grid-template-rows: 1fr 1fr;
      }
    }

    /* 编辑器面板 */
    .editor-panel {
      display: flex;
      flex-direction: column;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 1rem;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
    }

    .panel-title {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .panel-actions {
      display: flex;
      gap: 0.5rem;
    }

    .panel-btn {
      padding: 0.375rem 0.75rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-secondary);
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.3s;
    }

    .panel-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* 文本输入区 */
    .editor-textarea {
      flex: 1;
      padding: 1rem;
      background: var(--bg-card);
      border: none;
      color: var(--text-primary);
      font-size: 0.9rem;
      line-height: 1.6;
      resize: none;
      outline: none;
      font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
    }

    .editor-textarea::placeholder {
      color: var(--text-secondary);
      opacity: 0.5;
    }

    /* 预览区 */
    .preview-content {
      flex: 1;
      padding: 1.5rem;
      overflow-y: auto;
      background: var(--bg-card);
    }

    /* Markdown 样式 */
    .markdown-body {
      color: var(--text-primary);
      line-height: 1.8;
    }

    .markdown-body h1,
    .markdown-body h2,
    .markdown-body h3,
    .markdown-body h4,
    .markdown-body h5,
    .markdown-body h6 {
      margin-top: 1.5rem;
      margin-bottom: 1rem;
      font-weight: 600;
      line-height: 1.3;
    }

    .markdown-body h1 { font-size: 2rem; border-bottom: 2px solid var(--border); padding-bottom: 0.5rem; }
    .markdown-body h2 { font-size: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 0.3rem; }
    .markdown-body h3 { font-size: 1.25rem; }
    .markdown-body h4 { font-size: 1.1rem; }

    .markdown-body p {
      margin-bottom: 1rem;
    }

    .markdown-body a {
      color: var(--accent);
      text-decoration: none;
    }

    .markdown-body a:hover {
      text-decoration: underline;
    }

    .markdown-body code {
      background: var(--bg-secondary);
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 0.85em;
    }

    .markdown-body pre {
      background: var(--bg-secondary);
      padding: 1rem;
      border-radius: 8px;
      overflow-x: auto;
      margin-bottom: 1rem;
    }

    .markdown-body pre code {
      background: none;
      padding: 0;
      border-radius: 0;
    }

    .markdown-body blockquote {
      border-left: 4px solid var(--accent);
      padding-left: 1rem;
      margin-left: 0;
      margin-bottom: 1rem;
      color: var(--text-secondary);
    }

    .markdown-body ul,
    .markdown-body ol {
      margin-bottom: 1rem;
      padding-left: 2rem;
    }

    .markdown-body li {
      margin-bottom: 0.25rem;
    }

    .markdown-body table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 1rem;
    }

    .markdown-body th,
    .markdown-body td {
      border: 1px solid var(--border);
      padding: 0.5rem 1rem;
      text-align: left;
    }

    .markdown-body th {
      background: var(--bg-secondary);
      font-weight: 600;
    }

    .markdown-body tr:nth-child(even) {
      background: var(--bg-secondary);
    }

    .markdown-body hr {
      border: none;
      border-top: 2px solid var(--border);
      margin: 2rem 0;
    }

    .markdown-body img {
      max-width: 100%;
      border-radius: 8px;
    }

    /* 任务列表 */
    .markdown-body .task-list-item {
      list-style-type: none;
      margin-left: -1.5rem;
    }

    .markdown-body .task-list-item input {
      margin-right: 0.5rem;
    }

    /* 工具栏 */
    .toolbar {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
      padding: 0.75rem;
      background: var(--bg-secondary);
      border-radius: 12px;
    }

    .toolbar-btn {
      padding: 0.5rem 0.75rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.3s;
      font-size: 0.875rem;
    }

    .toolbar-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* 快捷操作区 */
    .quick-actions {
      display: flex;
      gap: 1rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .action-group {
      display: flex;
      gap: 0.5rem;
    }

    /* 字数统计 */
    .stats-bar {
      display: flex;
      gap: 1.5rem;
      padding: 0.75rem 1rem;
      background: var(--bg-secondary);
      border-radius: 8px;
      font-size: 0.875rem;
      color: var(--text-secondary);
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }

    .stat-value {
      color: var(--accent);
      font-weight: 600;
    }

    /* 滚动条样式 */
    .editor-textarea::-webkit-scrollbar,
    .preview-content::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    .editor-textarea::-webkit-scrollbar-track,
    .preview-content::-webkit-scrollbar-track {
      background: var(--bg-secondary);
    }

    .editor-textarea::-webkit-scrollbar-thumb,
    .preview-content::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }

    .editor-textarea::-webkit-scrollbar-thumb:hover,
    .preview-content::-webkit-scrollbar-thumb:hover {
      background: var(--accent);
    }
  </style>
</head>
<body>
  <!-- 导航栏 -->
  <nav>
    <div class="nav-container">
      <a href="../index.html" class="logo">🐙 Octopus</a>
      <div class="nav-links">
        <a href="qr-generator.html">二维码</a>
        <a href="password-gen.html">密码生成</a>
        <a href="json-formatter.html">JSON</a>
      </div>
    </div>
  </nav>

  <!-- 主体 -->
  <main class="tool-container">
    <div class="tool-header">
      <h1>Markdown 预览</h1>
      <p>实时预览 Markdown 渲染效果，支持导出 HTML</p>
    </div>

    <!-- 工具栏 -->
    <div class="toolbar">
      <button class="toolbar-btn" onclick="insertText('**', '**')">📝 粗体</button>
      <button class="toolbar-btn" onclick="insertText('*', '*')">📌 斜体</button>
      <button class="toolbar-btn" onclick="insertText('# ', '')">📑 标题</button>
      <button class="toolbar-btn" onclick="insertText('- ', '')">📋 列表</button>
      <button class="toolbar-btn" onclick="insertText('```\n', '\n```')">💻 代码块</button>
      <button class="toolbar-btn" onclick="insertText('> ', '')">💬 引用</button>
      <button class="toolbar-btn" onclick="insertText('[', '](url)')">🔗 链接</button>
      <button class="toolbar-btn" onclick="insertText('![alt](', ')')">🖼️ 图片</button>
      <button class="toolbar-btn" onclick="insertText('---\n', '')">➖ 分割线</button>
    </div>

    <!-- 快捷操作 -->
    <div class="quick-actions">
      <div class="action-group">
        <button class="btn" onclick="loadSample()">📄 加载示例</button>
        <button class="btn btn-secondary" onclick="clearEditor()">🗑️ 清空</button>
      </div>
      <div class="action-group">
        <button class="btn" onclick="copyMarkdown()">📋 复制 Markdown</button>
        <button class="btn" onclick="copyHTML()">📄 复制 HTML</button>
        <button class="btn btn-secondary" onclick="downloadHTML()">💾 下载 HTML</button>
      </div>
    </div>

    <!-- 编辑器容器 -->
    <div class="editor-container">
      <!-- 编辑面板 -->
      <div class="editor-panel">
        <div class="panel-header">
          <div class="panel-title">
            <span>📝</span>
            <span>Markdown</span>
          </div>
          <div class="panel-actions">
            <button class="panel-btn" onclick="pasteText()">粘贴</button>
          </div>
        </div>
        <textarea 
          class="editor-textarea" 
          id="markdown-input" 
          placeholder="# 在此输入 Markdown...

支持语法：
- 标题 (# ## ###)
- 粗体 (**文字**) / 斜体 (*文字*)
- 代码块 (```语言)
- 列表 (- 或 1.)
- 引用 (>)
- 链接 [文字](url)
- 表格
- 任务列表 (- [x])
- 分割线 (---)"
          oninput="updatePreview()"
        ></textarea>
        <div class="stats-bar">
          <div class="stat-item">
            <span>字数：</span>
            <span class="stat-value" id="char-count">0</span>
          </div>
          <div class="stat-item">
            <span>行数：</span>
            <span class="stat-value" id="line-count">0</span>
          </div>
          <div class="stat-item">
            <span>预览模式：</span>
            <span class="stat-value">GitHub 风格</span>
          </div>
        </div>
      </div>

      <!-- 预览面板 -->
      <div class="editor-panel">
        <div class="panel-header">
          <div class="panel-title">
            <span>👁️</span>
            <span>预览</span>
          </div>
          <div class="panel-actions">
            <button class="panel-btn" onclick="refreshPreview()">刷新</button>
          </div>
        </div>
        <div class="preview-content">
          <div class="markdown-body" id="preview">
            <p style="color: var(--text-secondary); text-align: center; margin-top: 3rem;">
              在左侧输入 Markdown，此处将实时预览渲染效果
            </p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- 页脚 -->
  <footer>
    <p>🐙 Octopus | 一个大脑，多条触手</p>
    <div style="margin: 0.5rem 0;">
      <a href="../about.html" style="color: var(--text-secondary); text-decoration: none; margin: 0 0.5rem; font-size: 0.8rem;">关于我们</a>
      <a href="../privacy.html" style="color: var(--text-secondary); text-decoration: none; margin: 0 0.5rem; font-size: 0.8rem;">隐私政策</a>
      <a href="../terms.html" style="color: var(--text-secondary); text-decoration: none; margin: 0 0.5rem; font-size: 0.8rem;">用户协议</a>
    </div>
    <p style="font-size: 0.75rem; color: var(--text-secondary); opacity: 0.7;">© 2026 Octopus</p>
  </footer>

  <!-- 提示 -->
  <div class="toast" id="toast"></div>

  <script>
    // 配置 Marked
    marked.setOptions({
      breaks: true,
      gfm: true,
      headerIds: true,
      mangle: false,
      sanitize: false,
      smartLists: true,
      smartypants: true,
      xhtml: false
    });

    // 更新预览
    function updatePreview() {
      const input = document.getElementById('markdown-input').value;
      const preview = document.getElementById('preview');
      
      // 解析 Markdown
      const html = marked.parse(input);
      preview.innerHTML = html;
      
      // 代码高亮
      preview.querySelectorAll('pre code').forEach((block) => {
        hljs.highlightElement(block);
      });
      
      // 更新统计
      updateStats(input);
    }

    // 更新统计
    function updateStats(text) {
      document.getElementById('char-count').textContent = text.length;
      document.getElementById('line-count').textContent = text.split('\n').length;
    }

    // 刷新预览
    function refreshPreview() {
      updatePreview();
      showToast('预览已刷新');
    }

    // 插入文本
    function insertText(before, after) {
      const textarea = document.getElementById('markdown-input');
      const start = textarea.selectionStart;
      const end = textarea.selectionEnd;
      const text = textarea.value;
      const selected = text.substring(start, end);
      
      const newText = text.substring(0, start) + before + selected + after + text.substring(end);
      textarea.value = newText;
      
      // 恢复光标位置
      const newCursor = start + before.length + selected.length;
      textarea.setSelectionRange(newCursor, newCursor);
      textarea.focus();
      
      updatePreview();
    }

    // 加载示例
    function loadSample() {
      const sample = `# Octopus Markdown 预览

这是一个 **Markdown** 示例文档，展示支持的语法。

## 📝 文本样式

- *斜体文本*
- **粗体文本**
- ~~删除线~~（部分渲染器支持）
- \`行内代码\`

## 📋 列表

### 无序列表
- 第一项
- 第二项
  - 子项 A
  - 子项 B
- 第三项

### 有序列表
1. 第一步
2. 第二步
3. 第三步

### 任务列表
- [x] 已完成任务
- [ ] 未完成任务
- [x] 颜色选择器开发
- [ ] 单位换算器开发

## 💻 代码块

\`\`\`javascript
// JavaScript 示例
function hello() {
  console.log("Hello, Octopus!");
  return "🐙";
}
\`\`\`

## 📊 表格

| 工具名称 | 状态 | 描述 |
|---------|------|------|
| 二维码生成器 | ✅ | 生成自定义二维码 |
| 密码生成器 | ✅ | 生成强密码 |
| JSON 格式化 | ✅ | 美化 JSON |
| 颜色选择器 | ✅ | 颜色格式转换 |

## 💬 引用

> Octopus 是一个高效的小工具集合网站。
> 
> 就像章鱼一样 —— 一个核心大脑，统筹无数灵活触手。

## 🔗 链接

[访问 Octopus 网站](https://watermonster555.github.io/octopus-tools/)

## ➖ 分割线

---

**Enjoy writing with Markdown!** 🎉`;

      document.getElementById('markdown-input').value = sample;
      updatePreview();
      showToast('已加载示例文档');
    }

    // 清空编辑器
    function clearEditor() {
      if (confirm('确定要清空编辑器吗？')) {
        document.getElementById('markdown-input').value = '';
        updatePreview();
        showToast('已清空');
      }
    }

    // 粘贴文本
    async function pasteText() {
      try {
        const text = await navigator.clipboard.readText();
        const textarea = document.getElementById('markdown-input');
        textarea.value = text;
        updatePreview();
        showToast('已粘贴');
      } catch (e) {
        showToast('无法读取剪贴板', 'error');
      }
    }

    // 复制 Markdown
    function copyMarkdown() {
      const text = document.getElementById('markdown-input').value;
      if (!text) {
        showToast('没有可复制的内容', 'error');
        return;
      }
      navigator.clipboard.writeText(text).then(() => {
        showToast('Markdown 已复制');
      });
    }

    // 复制 HTML
    function copyHTML() {
      const html = document.getElementById('preview').innerHTML;
      navigator.clipboard.writeText(html).then(() => {
        showToast('HTML 已复制');
      });
    }

    // 下载 HTML
    function downloadHTML() {
      const markdown = document.getElementById('markdown-input').value;
      if (!markdown) {
        showToast('没有可导出的内容', 'error');
        return;
      }

      const htmlContent = document.getElementById('preview').innerHTML;
      const fullHTML = `<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exported from Octopus Markdown</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem;
      line-height: 1.8;
      color: #333;
    }
    pre {
      background: #f5f5f5;
      padding: 1rem;
      border-radius: 8px;
      overflow-x: auto;
    }
    code {
      background: #f5f5f5;
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
      font-family: Consolas, Monaco, monospace;
    }
    blockquote {
      border-left: 4px solid #00d4aa;
      padding-left: 1rem;
      margin-left: 0;
      color: #666;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 1rem 0;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 0.5rem 1rem;
      text-align: left;
    }
    th {
      background: #f5f5f5;
    }
    img {
      max-width: 100%;
    }
  </style>
</head>
<body>
${htmlContent}
</body>
</html>`;

      const blob = new Blob([fullHTML], { type: 'text/html' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'markdown-export.html';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      
      showToast('HTML 文件已下载');
    }

    // 显示提示
    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      if (type === 'error') {
        toast.style.background = '#e74c3c';
        toast.style.color = '#fff';
      } else {
        toast.style.background = 'var(--accent)';
        toast.style.color = '#000';
      }
      toast.classList.add('show');
      setTimeout(() => {
        toast.classList.remove('show');
      }, 2000);
    }

    // 页面加载时加载示例
    document.addEventListener('DOMContentLoaded', () => {
      loadSample();
    });
  </script>
</body>
</html>
